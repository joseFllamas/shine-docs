<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Nunito Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Focus state helper */
        .focus-canvas {
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-color: #F7F5F2; /* background-off-white */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-web-outer-bg">
<div class="max-w-[480px] mx-auto bg-background-off-white focus-canvas relative shadow-2xl overflow-hidden">
<!-- Header Actions: Skip Link Only -->
<header class="flex justify-end items-center px-6 pt-8">
<button class="flex items-center gap-1 py-2 px-4 rounded-full text-on-surface-variant hover:bg-surface-variant/20 active:scale-[0.98] transition-all duration-200">
<span class="font-label-medium text-label-medium">Saltar</span>
<span class="material-symbols-outlined text-[20px]" data-icon="chevron_right">chevron_right</span>
</button>
</header>
<!-- Main Content Area: Focus Mode -->
<main class="flex flex-grow flex-col items-center justify-center px-10">
<!-- Vertical Text Container -->
<div class="flex flex-col items-center space-y-4">
<!-- Large Display Word -->
<h1 class="font-activity-display text-activity-display text-primary text-center tracking-widest uppercase" style="writing-mode: vertical-rl; text-orientation: upright;">
                    Explorar
                </h1>
<!-- Visual Anchor / Decorative Element -->
<div class="h-24 w-[2px] bg-primary/20 rounded-full my-8"></div>
<!-- Supporting Interaction Icon -->
<button class="w-16 h-16 rounded-full bg-primary text-on-primary flex items-center justify-center shadow-md active:scale-90 transition-transform duration-150">
<span class="material-symbols-outlined text-[32px]" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
</div>
</main>
<!-- Footer: Progress and Tracking -->
<footer class="px-8 pb-12 flex flex-col items-center gap-6">
<!-- Progress Counter -->
<div class="flex flex-col items-center w-full gap-3">
<span class="font-label-medium text-label-medium text-text-secondary tracking-widest">
                    3 / 12
                </span>
<!-- Progress Bar -->
<div class="w-full h-3 bg-gray-light rounded-full overflow-hidden">
<div class="h-full bg-secondary-container rounded-full" style="width: 25%;"></div>
</div>
</div>
<!-- Activity Dots -->
<div class="flex gap-2">
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-primary"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
<div class="w-2 h-2 rounded-full bg-gray-light"></div>
</div>
</footer>
<!-- Hidden Nav Suppression: Page is task-focused activity player -->
</div>
<!-- Visual Polish: Decorative background shapes for calm encouragement -->
<div class="fixed top-0 left-0 w-full h-full pointer-events-none overflow-hidden z-[-1] opacity-20">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] rounded-full bg-primary-fixed blur-3xl"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] rounded-full bg-secondary-fixed blur-3xl"></div>
</div>
